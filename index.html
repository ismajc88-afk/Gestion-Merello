<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Merello Planner 2026</title>

  <!-- Configuración PWA / Android -->
  <meta name="theme-color" content="#09090b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Merello" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/escudo-merello.png" />
  <link rel="apple-touch-icon" href="/escudo-merello.png" />

  <!-- iOS Splash Screen -->
  <link rel="apple-touch-startup-image" href="/icon-512.png" />

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('✅ Service Worker registrado:', reg.scope))
          .catch(err => console.error('❌ Error Service Worker:', err));
      });
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <div id="startup-watchdog"
    style="display:none; position:fixed; inset:0; z-index:99999; background:#000; color:#ff0000; padding:2rem; font-family:monospace; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="font-size:2rem; margin-bottom:1rem;">⚠️ SISTEMA BLOQUEADO</h1>
    <p style="color:#ffffff; margin-bottom:2rem; text-align:center;">La aplicación no responde. Pulsa el botón para
      reiniciar los datos.</p>
    <button onclick="hardReset()"
      style="background:#ff0000; color:white; border:none; padding:1rem 2rem; font-size:1.5rem; font-weight:bold; cursor:pointer; border-radius:1rem;">🧨
      REINICIO DE FÁBRICA</button>
  </div>

  <script>
    function hardReset() {
      try {
        localStorage.clear();
        sessionStorage.clear();
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) registration.unregister();
          });
        }
        alert('Datos borrados. Recargando...');
        window.location.reload();
      } catch (e) {
        alert('Error borrando: ' + e);
      }
    }

    setTimeout(() => {
      const root = document.getElementById('root');
      const hasContent = root && root.innerText.trim().length > 0;
      if (!hasContent || document.body.innerText.includes('CRITICAL_RENDER_ERROR')) {
        document.getElementById('startup-watchdog').style.display = 'flex';
      }
    }, 5000);
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
